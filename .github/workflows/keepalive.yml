name: Supabase keepalive

# Runs every 5 days to prevent Supabase free tier from pausing due to inactivity.
# Supabase pauses projects after 7 days without API activity.
on:
  schedule:
    - cron: '0 10 */5 * *'  # days 1, 6, 11, 16, 21, 26 of each month at 10:00 UTC
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/" || true
